name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.6.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build npm bundle
        run: bun run build

      - name: Changelog docs
        run: bun run docs:changelog:check

      - name: Versioned docs snapshot
        run: bun run docs:version:check

      - name: Docs release baseline
        run: bun run docs:release-baseline:check

      - name: Test
        run: bun test

  binaries:
    name: Binary ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    needs: quality-gate

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            asset: macos-arm64
            runner: macos-15
          - target: bun-darwin-x64
            asset: macos-x64
            runner: macos-15-intel
          - target: bun-linux-arm64
            asset: linux-arm64
            runner: ubuntu-24.04-arm
          - target: bun-linux-x64
            asset: linux-x64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binary
        run: bun run scripts/build-binary.ts ${{ matrix.target }}

      - name: Make binary executable
        run: chmod +x dist/bin/soba-*

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: soba-${{ matrix.asset }}
          path: dist/bin/soba-*
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - quality-gate
      - binaries

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist/release
          sha256sum soba-* > SHA256SUMS

      - name: Write release notes
        run: bun run scripts/generate-changelog.ts --release-notes "$RELEASE_TAG" > "$RUNNER_TEMP/release-notes.md"

      - name: Publish GitHub release assets
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/release/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/release/* \
              --title "SOBA Agent ${RELEASE_TAG}" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
