name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    name: Bun quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Architecture boundaries
        run: bun run check:boundaries

      - name: Architecture dependency graph
        run: bun run docs:deps:check

      - name: Changelog docs
        run: bun run docs:changelog:check

      - name: Versioned docs snapshot
        run: bun run docs:version:check

      - name: Docs release baseline
        run: bun run docs:release-baseline:check

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
